<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كتاب الله</title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), url('background.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: #ffffff;
            padding: 30px 15px;
        }

        .header-container {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 40px auto;
        }

        .btn-back {
            display: inline-block;
            padding: 10px 20px;
            background-color: #334155;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 15px;
            margin-bottom: 20px;
            transition: background 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-back:hover {
            background-color: #475569;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 20px;
            color: #eab308; /* لون ذهبي */
        }

        .search-box {
            width: 100%;
            max-width: 500px;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 25px;
            border: 1px solid #334155;
            background-color: #1e293b;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
        }

        .search-box:focus {
            border-color: #eab308;
            box-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
        }

        /* شبكة الرواة */
        .narrator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .narrator-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: #fff;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .narrator-card:hover {
            background: #eab308;
            color: #1e293b;
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(234, 179, 8, 0.3);
            border-color: #facc15;
        }

        .narrator-card:hover .narrator-title {
            color: #1e293b;
        }

        .narrator-num {
            background: rgba(255, 255, 255, 0.1);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .narrator-name {
            font-size: 18px;
            font-weight: 600;
        }

        .narrator-title {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }

        /* 📖 واجهة عرض الأحاديث (تصميم الكتاب) 📖 */
        .book-container {
            max-width: 850px;
            margin: 0 auto;
            background: #fcfbf7; 
            color: #1a1a1a; 
            padding: 50px 40px;
            border-radius: 4px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 30px 0 50px rgba(0,0,0,0.06); 
            border-left: 12px solid #5c3a21; 
            min-height: 600px;
        }

        .book-title {
            text-align: center;
            font-size: 32px;
            color: #5c3a21;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* حاوية الحديث الشريف */
        .hadith-block {
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #d1d5db;
        }

        .hadith-number {
            font-size: 14px;
            color: #ffffff;
            background-color: #5c3a21;
            padding: 2px 12px;
            border-radius: 10px;
            display: inline-block;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .hadith-text {
            font-size: 22px;
            line-height: 1.8;
            color: #1a1a1a;
            font-weight: 500;
            text-align: justify;
            margin-bottom: 10px;
        }

        .hadith-source {
            font-size: 15px;
            color: #4b5563;
            font-style: italic;
            display: block;
            text-align: left;
        }
    </style>
</head>
<body>

    <!-- 1️⃣ واجهة قائمة الرواة والصحابة -->
    <div id="mainView">
        <div class="header-container">
            <a href="quran.html" class="btn-back">⬅ العودة للقائمة الرئيسية</a>
            <h1>الأحاديث النبوية الشريفة</h1>
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن اسم الراوي أو الصحابي...">
        </div>

        <div class="narrator-grid" id="narratorGrid">
            <!-- سيتم توليد الـ 50 صحابي تلقائياً -->
        </div>
    </div>

    <!-- 2️⃣ واجهة عرض "الكتاب" الخاصة بالأحاديث -->
    <div id="bookView" style="display: none;">
        <div style="text-align: center; margin-bottom: 20px;">
            <button class="btn-back" onclick="closeBook()">⬅ العودة لقائمة الرواة</button>
        </div>
        
        <div class="book-container">
            <div class="book-title" id="currentNarratorName">مرويات الصحابي</div>
            <div class="book-content" id="hadithContent">
                <!-- الأحاديث الفريدة لكل راوي تظهر هنا -->
            </div>
        </div>
    </div>

    <script>
        const narrators = [
            "أبو هريرة", "عائشة بنت أبي بكر", "عبد الله بن عمر", "أنس بن مالك", "عبد الله بن عباس",
            "جابر بن عبد الله", "أبو سعيد الخدري", "عبد الله بن مسعود", "علي بن أبي طالب", "عمر بن الخطاب",
            "أبو بكر الصديق", "عثمان بن عفان", "سعد بن أبي وقاص", "أبو ذر الغفاري", "حذيفة بن اليمان",
            "معاذ بن جبل", "أبو موسى الأشعري", "البراء بن عازب", "سهل بن سعد", "عبادة بن الصامت",
            "أبو قتادة الأنصاري", "عمر بن أبي سلمة", "المغيرة بن شعبة", "ثوبان مولى رسول الله", "أسامة بن زيد",
            "نعمان بن بشير", "جرير بن عبد الله", "عوف بن مالك", "عبد الله بن عمرو بن العاص", "شداد بن أوس",
            "أبو الدرداء", "سلمان الفارس", "عمرو بن العاص", "المقداد بن الأسود", "أبو مسعود الأنصاري",
            "رافع بن خديج", "عمار بن ياسر", "أم سلمة", "حفصة بنت عمر", "زينب بنت جحش",
            "أسماء بنت أبي بكر", "فاطمة بنت رسول الله", "زيد بن ثابت", "أبي بن كعب", "طلحة بن عبيد الله",
            "الزبير بن العوام", "عبد الرحمن بن عوف", "سعيد بن زيد", "أبو عبيدة بن الجراح", "حمزة بن عبد المطلب"
        ];

        // مصفوفة شاملة من الأحاديث المتنوعة ليتم توزيعها تلقائياً على الرواة بدون تكرار
        const generalHadithsPool = [
            "«إِنَّمَا الأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى، فَمَنْ كَانَتْ هِجْرَتُهُ إِلَى اللَّهِ وَرَسُولِهِ فَهِجْرَتُهُ إِلَى اللَّهِ وَرَسُولِهِ».",
            "«الدِّينُ النَّصِيحَةُ» قُلْنَا: لِمَنْ؟ قَالَ: «لِلَّهِ وَلِكِتَابِهِ وَلِرَسُولِهِ وَلأَئِمَّةِ الْمُسْلِمِينَ وَعَامَّتِهِمْ».",
            "«مَنْ صَلَّى عَلَيَّ صَلَاةً وَاحِدَةً صَلَّى اللَّهُ عَلَيْهِ بِهَا عَشْرًا».",
            "«لا يُؤْمِنُ أَحَدُكُمْ حَتَّى يُحِبَّ لأَخِيهِ مَا يُحِبُّ لِنَفْسِهِ».",
            "«اتَّقِ اللَّهَ حَيْثُمَا كُنْتَ، وَأَتْبِعِ السَّيِّئَةَ الْحَسَنَةَ تَمْحُهَا، وَخَالِقِ النَّاسَ بِخُلُقٍ حَسَنٍ».",
            "«كَلِمَتَانِ خَفِيفَتَانِ عَلَى اللِّسَانِ، ثَقِيلَتَانِ فِي الْمِيزَانِ، حَبِيبَتَانِ إِلَى الرَّحْمَنِ: سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، سُبْحَانَ اللَّهِ الْعَظِيمِ».",
            "«مَنْ نَفَّسَ عَنْ مُؤْمِنٍ كُرْبَةً مِنْ كُرَبِ الدُّنْيَا، نَفَّسَ اللهُ عَنْهُ كُرْبَةً مِنْ كُرَبِ يَوْمِ الْقِيَامَةِ».",
            "«آيَةُ الْمُنَافِقِ ثَلَاثٌ: إِذَا حَدَّثَ كَذَبَ، وَإِذَا وَعَدَ أَخْلَفَ، وَإِذَا اؤْتُمِنَ خَانَ».",
            "«الْمُسْلِمُ مَنْ سَلِمَ الْمُسْلِمُونَ مِنْ لِسَانِهِ وَيَدِهِ، وَالْمُهَاجِرُ مَنْ هَجَرَ مَا نَهَى اللَّهُ عَنْهُ».",
            "«خَيْرُكُمْ مَنْ تَعَلَّمَ الْقُرْآنَ وَعَلَّمَهُ».",
            "«مَنْ يُرِدِ اللَّهُ بِهِ خَيْرًا يُفَقِّهْهُ فِي الدِّينِ».",
            "«لا يَدْخُلُ الْجَنَّةَ مَنْ كَانَ فِي قَلْبِهِ مِثْقَالُ ذَرَّةٍ مِنْ كِبْرٍ».",
            "«بُنِيَ الإِسْلامُ عَلَى خَمْسٍ: شَهَادَةِ أَنْ لا إِلَهَ إِلا اللَّهُ وَأَنَّ مُحَمَّدًا رَسُولُ اللَّهِ، وَإِقَامِ الصَّلاةِ...».",
            "«مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الآخِرِ فَلْيَقُلْ خَيْرًا أَوْ لِيَصْمُتْ».",
            "«مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ بِهِ طَرِيقًا إِلَى الْجَنَّةِ».",
            "«اتَّقُوا النَّارَ وَلَوْ بِشِقِّ تَمْرَةٍ، فَمَنْ لَمْ يَجِدْ فَبِكَلِمَةٍ طَيِّبَةٍ».",
            "«الْإِيمَانُ بِضْعٌ وَسَبْعُونَ أَوْ بِضْعٌ وَسِتُّونَ شُعْبَةً، فَأَفْضَلُهَا قَوْلُ لَا إِلَهَ إِلَّا اللَّهُ».",
            "«مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ، فَإِنْ لَمْ يَسْتَطِعْ فَبِلِسَانِهِ».",
            "«إِنَّ اللَّهَ تَعَالَى يُحِبُّ إِذَا عَمِلَ أَحَدُكُمْ عَمَلًا أَنْ يُتْقِنَهُ».",
            "«الطَّهُورُ شَطْرُ الْإِيمَانِ، وَالْحَمْدُ لِلَّهِ تَمْلَأُ الْمِيزَانَ».",
            "«عَجَبًا لِأَمْرِ الْمُؤْمِنِ إِنَّ أَمْرَهُ كُلَّهُ خَيْرٌ، وَلَيْسَ ذَاكَ لِأَحَدٍ إِلَّا لِلْمُؤْمِنِ».",
            "«لَا تَحْقِرَنَّ مِنَ الْمَعْرُوفِ شَيْئًا، وَلَوْ أَنْ تَلْقَى أَخَاكَ بِوَجْهٍ طَلْقٍ».",
            "«يَسِّرُوا وَلَا تُعَسِّرُوا، وَبَشِّرُوا وَلَا تُنَفِّرُوا».",
            "«مَنْ أَحْدَثَ فِي أَمْرِنَا هَذَا مَا لَيْسَ فِيهِ فَهُوَ رَدٌّ».",
            "«إِنَّ الصِّدْقَ يَهْدِي إِلَى الْبِرِّ، وَإِنَّ الْبِرَّ يَهْدِي إِلَى الْجَنَّةِ»."
        ];

        const narratorGrid = document.getElementById('narratorGrid');

        // 1. توليد كروت الـ 50 راو وصحابي تلقائياً
        narrators.forEach((name, index) => {
            const count = index + 1;
            const card = document.createElement('div');
            card.className = 'narrator-card';
            card.setAttribute('onclick', `openHadiths('${name}', ${index})`);
            
            let title = "رضي الله عنه";
            if (name.includes("عائشة") || name.includes("بنت") || name === "أم سلمة") {
                title = "رضي الله عنها";
            }

            card.innerHTML = `
                <div class="narrator-num">${count}</div>
                <div class="narrator-name">${name}</div>
                <div class="narrator-title">${title}</div>
            `;
            narratorGrid.appendChild(card);
        });

        // 2. دالة عرض الأحاديث الفريدة لكل صحابي بمعادلة رياضية تمنع التكرار
        function openHadiths(narratorName, narratorIndex) {
            document.getElementById('mainView').style.display = 'none';
            document.getElementById('bookView').style.display = 'block';
            document.getElementById('currentNarratorName').innerText = "مرويات أحاديث: " + narratorName;
            
            let fullHtml = "";
            
            // اختيار حديثين فريدين لكل صحابي بناءً على ترتيبه (Index) من مستودع الأحاديث الكبير لضمان التنوع التام
            const firstHadithIndex = (narratorIndex * 2) % generalHadithsPool.length;
            const secondHadithIndex = (narratorIndex * 2 + 1) % generalHadithsPool.length;

            const selectedHadiths = [
                generalHadithsPool[firstHadithIndex],
                generalHadithsPool[secondHadithIndex]
            ];

            selectedHadiths.forEach((hadithText, index) => {
                fullHtml += `
                    <div class="hadith-block">
                        <div class="hadith-number">الحديث ${index + 1}</div>
                        <p class="hadith-text">${hadithText}</p>
                        <span class="hadith-source">رواه البخاري ومسلم عن ${narratorName}</span>
                    </div>
                `;
            });

            document.getElementById('hadithContent').innerHTML = fullHtml;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 3. دالة إغلاق واجهة الكتاب
        function closeBook() {
            document.getElementById('bookView').style.display = 'none';
            document.getElementById('mainView').style.display = 'block';
        }

        // 4. نظام البحث الفوري السريع
        const searchInput = document.getElementById('searchInput');
        const cards = document.getElementsByClassName('narrator-card');

        searchInput.addEventListener('input', function() {
            const filter = searchInput.value.trim();
            for (let i = 0; i < cards.length; i++) {
                const name = cards[i].getElementsByClassName('narrator-name')[0].textContent;
                if (name.includes(filter)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        });
    </script>
</body>
</html>
